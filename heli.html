<!DOCTYPE html>
<html lang="si">
<head><title>Heli Crash</title>
<style>body{background:#000;color:#fff;text-align:center;padding:20px;}</style></head>
<body>
    <button onclick="location.href='dashboard.html'">← BACK</button>
    <h1>💎 <span id="bal">500</span></h1>
    <h1 id="mult">1.00x</h1>
    <input type="number" id="bet" placeholder="25-100">
    <button onclick="start()">START</button><button onclick="cash()">CASH OUT</button>
    <h2 id="res"></h2>
    <script>
        let mult = 1.00, active = false, b = parseFloat(localStorage.getItem('balance') || 500);
        document.getElementById('bal').innerText = b.toFixed(2);
        function start() {
            active = true; mult = 1.00;
            let int = setInterval(()=>{
                mult += 0.1;
                document.getElementById('mult').innerText = mult.toFixed(2)+"x";
                if(Math.random() < 0.05) { clearInterval(int); active = false; document.getElementById('res').innerHTML = '<span style="color:red">Opps you lost honey try again!</span>'; }
            }, 200);
        }
        function cash() {
            if(!active) return;
            let bet = parseFloat(document.getElementById('bet').value);
            b = b + (bet * mult - bet);
            localStorage.setItem('balance', b);
            document.getElementById('bal').innerText = b.toFixed(2);
            document.getElementById('res').innerHTML = '<span style="color:green">Congratulations Baby you win!</span>';
            active = false;
        }
    </script>
</body>
</html>
