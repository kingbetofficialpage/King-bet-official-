<!DOCTYPE html>
<html>
<head>
    <title>King Bet Dashboard</title>
    <style>
        body { font-family: Arial; background-color: #121212; color: white; text-align: center; padding: 20px; }
        
        .game-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 30px; 
        }
        
        .game-card { 
            width: 140px; 
            text-decoration: none; 
        }
        
        .game-img { 
            width: 100%; 
            height: 140px; 
            border-radius: 20px; 
            border: 3px solid #ffcc00; 
            object-fit: cover; 
            transition: 0.3s;
        }
        
        .game-img:hover { transform: scale(1.05); }
        
        .bank-details { margin-top: 50px; padding: 20px; border: 1px solid #444; border-radius: 15px; background: #1e1e1e; }
    </style>
</head>
<body>

    <h1>King Bet Dashboard</h1>
    <p>ඔබේ ඩයමන්ඩ්: 0</p>
    
    <div class="game-container">
        <a href="YOUR_AVIATOR_LINK_HERE" class="game-card">
            <img src="aviator.jpg.webp" alt="Aviator" class="game-img">
            <p>Aviator</p>
        </a>
        
        <a href="YOUR_AVIATOR_LINK_HERE" class="game-card">
            <img src="jetx.jpg" alt="JetX" class="game-img">
            <p>JetX</p>
        </a>
    </div>
    
    <div class="bank-details">
        <h3>බැංකු විස්තර (BOC)</h3>
        <p>නම: SUPUN NIRMAL WEERASINGHA</p>
        <p>ගිණුම් අංකය: 0070563857</p>
    </div>
</body>
</html>
