<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background-color: #000; color: white; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .diamond-box { background: #333; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: #ffcc00; }
        
        /* වීඩියෝව සඳහා රතු කොටුව */
        .video-box { width: 100%; height: 200px; margin: 20px 0; border: 2px solid red; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* ගේම් සඳහා හරිත කොටු */
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .game-item { width: 100%; height: 120px; border: 2px solid #00ff00; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div>👤 මගේ Profile</div>
        <div class="diamond-box">💎 ඩයමන්ඩ්: 0</div>
    </div>

    <div class="video-box">
        <iframe src="https://youtu.be/yDrej0e4GWE" allowfullscreen></iframe>
    </div>

    <div class="games-grid">
        <div class="game-item"></div>
        <div class="game-item"></div>
        <div class="game-item"></div>
        <div class="game-item"></div>
    </div>

</body>
</html>
