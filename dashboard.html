<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>King Bet Dashboard</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .wallet { background: #222; padding: 15px; border-radius: 20px; border: 1px solid #ffcc00; color: #ffcc00; font-size: 20px; margin-bottom: 20px; }
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-item { border: 2px solid #00ff00; border-radius: 15px; overflow: hidden; display: block; }
        .game-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>
    <div class="wallet">💎 ශේෂය: <span id="balance">500.00</span></div>
    <div class="games-grid">
        <a href="spin.html" class="game-item"><img src="aviator.jpg.webp"></a>
        <a href="dice.html" class="game-item"><img src="jetx.jpg"></a>
        <a href="heli.html" class="game-item"><img src="7updown.jpg"></a>
        <a href="spin.html" class="game-item"><img src="luckyspin.png"></a>
    </div>
    <script>
        document.getElementById('balance').innerText = parseFloat(localStorage.getItem('balance') || 500).toFixed(2);
    </script>
</body>
</html>
