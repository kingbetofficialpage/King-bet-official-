<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Bet Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: white; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .diamond-box { background: #333; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: #ffcc00; }
        
        /* වීඩියෝ කොටුව - මෙතනට ඔබේ වීඩියෝ ලින්ක් එක එනවා */
        .video-box { width: 100%; height: 250px; margin: 20px 0; border: 2px solid red; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* ගේම්ස් පෙන්වන කොටු */
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .game-item { width: 100%; height: 140px; border: 2px solid #00ff00; border-radius: 10px; overflow: hidden; }
        .game-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        <div>👤 Profile</div>
        <div class="diamond-box">💎 ඩයමන්ඩ්: 0</div>
    </div>

    <div class="video-box">
        <iframe src="https://www.youtube.com/embed/VID_ID_HERE" allowfullscreen></iframe>
    </div>

    <div class="games-grid">
        <a href="#" class="game-item">
            <img src="aviator.jpg.webp" alt="Aviator">
        </a>
        <a href="#" class="game-item">
            <img src="jetx.jpg" alt="JetX">
        </a>
        <div class="game-item"></div>
        <div class="game-item"></div>
    </div>

</body>
</html>
