<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background-color: black; height: 100vh; overflow: hidden; }
        
        /* වීඩියෝව තිරය පුරාම තැබීමට */
        .video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* බොත්තම වීඩියෝවට උඩින් පෙන්වීමට */
        .btn-container { 
            position: absolute; 
            bottom: 40px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            z-index: 999; /* මෙය අනිවාර්යයෙන්ම වීඩියෝවට උඩින් තියයි */
        }
        
        .btn { 
            padding: 15px 50px; 
            background: #ffcc00; 
            color: black; 
            border: none; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 20px; 
            text-decoration: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/l177exMjs7Y?autoplay=1&mute=1&loop=1&playlist=l177exMjs7Y" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="btn-container">
        <a href="dashboard.html" class="btn">Enter King Bet</a>
    </div>

</body>
</html>
